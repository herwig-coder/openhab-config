uid: page_status
config:
  label: Status
  icon: oh:house
  order: "0"
  sidebar: true
blocks:
  - component: oh-block
    config:
      style:
        padding: "4px 4px 4px 4px"
        margin: "0"
    slots:
      default:

        # ── ROW 1: Current weather (33%) + Forecast (66%) ────────────────────
        - component: oh-grid-row
          config:
            style:
              margin: "0 0 4px 0"
              align-items: "stretch"
          slots:
            default:
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "33"
                  style:
                    padding: "0 2px 0 0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_weather_current
                      config: {}
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "66"
                  style:
                    padding: "0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_weather_forecast
                      config: {}

        # ── ROW 2: Electricity prices (66%) + Energy meter (33%) ─────────────
        - component: oh-grid-row
          config:
            style:
              margin: "0 0 4px 0"
              align-items: "stretch"
          slots:
            default:
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "66"
                  style:
                    padding: "0 2px 0 0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_electricity_prices
                      config: {}
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "33"
                  style:
                    padding: "0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_energy_meter
                      config: {}

        # ── ROW 3: Train + Climate rooms + Info/misc (equal thirds) ──────────
        - component: oh-grid-row
          config:
            style:
              margin: "0"
              align-items: "stretch"
          slots:
            default:
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "33"
                  style:
                    padding: "0 2px 0 0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_train
                      config: {}
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "33"
                  style:
                    padding: "0 2px 0 0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_climate_rooms
                      config: {}
              - component: oh-grid-col
                config:
                  width: "100"
                  medium: "33"
                  style:
                    padding: "0"
                    margin: "0"
                    align-self: "stretch"
                slots:
                  default:
                    - component: widget:widget_info_misc
                      config: {}
