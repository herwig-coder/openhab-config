uid: page_status
label: Status
config:
  label: Status
  icon: oh:house
  order: "0"
component: oh-grid-page
slots:
  default:

    # ── ROW 1: Current weather (1/3) + Forecast (2/3) ────────────────────────
    - component: oh-grid-row
      config:
        style:
          margin-bottom: "12px"
      slots:
        default:
          - component: oh-grid-col
            config:
              width: "33"
            slots:
              default:
                - component: widget_weather_current

          - component: oh-grid-col
            config:
              width: "67"
            slots:
              default:
                - component: widget_weather_forecast

    # ── ROW 2: Electricity prices (2/3) + Energy meter (1/3) ─────────────────
    - component: oh-grid-row
      config:
        style:
          margin-bottom: "12px"
      slots:
        default:
          - component: oh-grid-col
            config:
              width: "67"
            slots:
              default:
                - component: widget_electricity_prices

          - component: oh-grid-col
            config:
              width: "33"
            slots:
              default:
                - component: widget_energy_meter

    # ── ROW 3: Train (1/3) + Climate rooms (1/3) + Info/misc (1/3) ───────────
    - component: oh-grid-row
      slots:
        default:
          - component: oh-grid-col
            config:
              width: "33"
            slots:
              default:
                - component: widget_train

          - component: oh-grid-col
            config:
              width: "33"
            slots:
              default:
                - component: widget_climate_rooms

          - component: oh-grid-col
            config:
              width: "34"
            slots:
              default:
                - component: widget_info_misc
